name: Fix assets
on:
  workflow_dispatch:
jobs:
  assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install sharp
      - run: |
          node -e "
          const sharp = require('sharp');
          const make = (w,h,f) => sharp({create:{width:w,height:h,channels:4,background:{r:8,g:8,b:8,alpha:1}}}).png().toFile(f);
          Promise.all([
            make(1024,1024,'assets/icon.png'),
            make(1024,1024,'assets/adaptive-icon.png'),
            make(1284,2778,'assets/splash-icon.png'),
          ]).then(()=>console.log('done'));
          "
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "fix: replace assets with sharp-generated PNGs"
          file_pattern: assets/*.png
